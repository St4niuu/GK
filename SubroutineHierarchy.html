<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Subroutine Hierarchy</title>

		<script>
			var canvas // The canvas that is used as the drawing surface
			var graphics // The 2D graphics context for drawing on the canvas.

			var X_LEFT = -4 // The xy limits for the coordinate system.
			var X_RIGHT = 4
			var Y_BOTTOM = -3
			var Y_TOP = 3

			var BACKGROUND = 'white'

			var pixelSize

			var frameNumber = 0 // Current frame number. goes up by one in each frame.

			/**
			 * Responsible for drawing the entire scene.
			 */
			function drawWorld() {
				graphics.save()
				graphics.fillStyle = 'green'
				graphics.translate(0, -2)
				graphics.scale(1, 2.5)
				filledTriangle(graphics)
				graphics.restore()

				graphics.save()
				graphics.translate(0, 0.5)
				graphics.rotate((-15 * Math.PI) / 180)

				graphics.save()
				graphics.fillStyle = 'red'
				graphics.scale(4, 0.25)
				filledRect()
				graphics.restore()

				graphics.save()
				graphics.translate(-1.9, 0)
				graphics.scale(1.5, 1.5)
				graphics.rotate((frameNumber * 2 * Math.PI) / 180)
				drawWheelWithSpokes()
				graphics.restore()

				graphics.save()
				graphics.translate(1.9, 0)
				graphics.scale(1.5, 1.5)
				graphics.rotate((frameNumber * 2 * Math.PI) / 180)
				drawWheelWithSpokes()
				graphics.restore()

				graphics.restore()
			}

			/**
			 * Updates frame before drawing
			 */
			function updateFrame() {
				frameNumber++
			}

			// Metoda rysująca pełne koło ze szprychami
			function drawWheelWithSpokes() {
				graphics.strokeStyle = 'black'
				circle() // Rysuje obrys zewnętrzny

				// Rysowanie 12 szprych
				for (var i = 0; i < 12; i++) {
					graphics.save()
					graphics.rotate(i * (Math.PI / 6)) // Obracamy kontekst o 30 stopni (pi/6) dla każdej ze szprych
					graphics.beginPath()
					graphics.moveTo(0, 0)
					graphics.lineTo(0.5, 0) // Długość połowy średnicy z funkcji circle()
					graphics.stroke()
					graphics.restore()
				}
			}

			//------------------- Some methods for drawing basic shapes. ----------------

			function line() {
				graphics.beginPath()
				graphics.moveTo(-0.5, 0)
				graphics.lineTo(0.5, 0)
				graphics.stroke()
			}

			function rect() {
				graphics.strokeRect(-0.5, -0.5, 1, 1)
			}

			function filledRect() {
				graphics.fillRect(-0.5, -0.5, 1, 1)
			}

			function circle() {
				graphics.beginPath()
				graphics.arc(0, 0, 0.5, 0, 2 * Math.PI)
				graphics.stroke()
			}

			function filledCircle() {
				graphics.beginPath()
				graphics.arc(0, 0, 0.5, 0, 2 * Math.PI)
				graphics.fill()
			}

			function filledTriangle(g2) {
				g2.beginPath()
				g2.moveTo(-0.5, 0)
				g2.lineTo(0.5, 0)
				g2.lineTo(0, 1)
				g2.closePath()
				g2.fill()
			}

			// ------------------------------- graphics support functions --------------------------

			function draw() {
				graphics.save()
				graphics.fillStyle = BACKGROUND
				graphics.fillRect(0, 0, canvas.width, canvas.height)
				graphics.fillStyle = 'black'
				applyLimits(graphics, X_LEFT, X_RIGHT, Y_TOP, Y_BOTTOM, false)
				graphics.lineWidth = pixelSize
				drawWorld()
				graphics.restore()
			}

			function applyLimits(g, xleft, xright, ytop, ybottom, preserveAspect) {
				var width = canvas.width
				var height = canvas.height
				if (preserveAspect) {
					var displayAspect = Math.abs(height / width)
					var requestedAspect = Math.abs((ybottom - ytop) / (xright - xleft))
					var excess
					if (displayAspect > requestedAspect) {
						excess = (ybottom - ytop) * (displayAspect / requestedAspect - 1)
						ybottom += excess / 2
						ytop -= excess / 2
					} else if (displayAspect < requestedAspect) {
						excess = (xright - xleft) * (requestedAspect / displayAspect - 1)
						xright += excess / 2
						xleft -= excess / 2
					}
				}
				var pixelWidth = Math.abs((xright - xleft) / width)
				var pixelHeight = Math.abs((ybottom - ytop) / height)
				pixelSize = Math.min(pixelWidth, pixelHeight)
				g.scale(width / (xright - xleft), height / (ybottom - ytop))
				g.translate(-xleft, -ytop)
			}

			//------------------ Animation framework ------------------------------

			var running = false

			function frame() {
				if (running) {
					updateFrame()
					draw()
					requestAnimationFrame(frame)
				}
			}

			function doAnimationCheckbox() {
				var shouldRun = document.getElementById('animateCheck').checked
				if (shouldRun != running) {
					running = shouldRun
					if (running) requestAnimationFrame(frame)
				}
			}

			//----------------------- initialization -------------------------------

			function init() {
				canvas = document.getElementById('thecanvas')
				if (!canvas.getContext) {
					document.getElementById('message').innerHTML = 'ERROR: Canvas not supported'
					return
				}
				graphics = canvas.getContext('2d')
				document.getElementById('animateCheck').checked = false
				document.getElementById('animateCheck').onchange = doAnimationCheckbox
				draw()
			}
		</script>
	</head>

	<body onload="init()" style="background-color: #eeeeee">
		<h3>Subroutine Hierarchy</h3>
		<noscript>
			<p><b style="color: red">Error: This page requires JavaScript, but it is not available.</b></p>
		</noscript>
		<p id="message">
			<label><input type="checkbox" id="animateCheck" /><b>Run the Animation</b></label>
		</p>
		<div style="float: left; border: 2px solid black">
			<canvas id="thecanvas" width="800" height="600" style="display: block"></canvas>
		</div>
	</body>
</html>
