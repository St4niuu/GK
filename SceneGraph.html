<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Scene Graph 2D</title>

		<script>
			var canvas // The canvas that is used as the drawing surface
			var graphics // The 2D graphics context for drawing on the canvas.

			var X_LEFT = -4 // The xy limits for the coordinate system.
			var X_RIGHT = 4
			var Y_BOTTOM = -3
			var Y_TOP = 3

			var BACKGROUND = 'white' // The display is filled with this color before the scene is drawn.

			var pixelSize // The size of one pixel, in the transformed coordinates.

			var frameNumber = 0 // Current frame number. goes up by one in each frame.

			var world // A SceneGraphNode representing the entire scene.

			// Zmienne globalne dla animowanych kół
			var leftWheel
			var rightWheel

			/**
			 * Builds the data structure that represents the entire picture.
			 */
			function createWorld() {
				world = new CompoundObject()

				var base = new TransformedObject(filledTriangle).setColor('green')
				base.setScale(1, 2.5).setTranslation(0, -2)
				world.add(base)

				var seesaw = new CompoundObject()
				var seesawTrans = new TransformedObject(seesaw).setTranslation(0, 0.5).setRotation(-15)
				world.add(seesawTrans)

				var bar = new TransformedObject(filledRect).setColor('red')
				bar.setScale(4, 0.25)
				seesaw.add(bar)

				leftWheel = new TransformedObject(wheelShape).setColor('black')
				leftWheel.setTranslation(-1.9, 0).setScale(1.5, 1.5)
				seesaw.add(leftWheel)

				rightWheel = new TransformedObject(wheelShape).setColor('black')
				rightWheel.setTranslation(1.9, 0).setScale(1.5, 1.5)
				seesaw.add(rightWheel)
			}

			/**
			 * This method is called just before each frame is drawn.
			 */
			function updateFrame() {
				frameNumber++
				// Aktualizacja obrotu kół w każdej klatce
				leftWheel.setRotation(frameNumber * 2)
				rightWheel.setRotation(frameNumber * 2)
			}

			//------------------- A Simple Scene Object-Oriented Scene Graph API ----------------

			function SceneGraphNode() {
				this.fillColor = null // If non-null, the default fillStyle for this node.
				this.strokeColor = null // If non-null, the default strokeStyle for this node.
			}
			SceneGraphNode.prototype.doDraw = function (g) {
				throw 'doDraw not implemented in SceneGraphNode'
			}
			SceneGraphNode.prototype.draw = function (g) {
				graphics.save()
				if (this.fillColor) {
					g.fillStyle = this.fillColor
				}
				if (this.strokeColor) {
					g.strokeStyle = this.strokeColor
				}
				this.doDraw(g)
				graphics.restore()
			}
			SceneGraphNode.prototype.setFillColor = function (color) {
				this.fillColor = color
				return this
			}
			SceneGraphNode.prototype.setStrokeColor = function (color) {
				this.strokeColor = color
				return this
			}
			SceneGraphNode.prototype.setColor = function (color) {
				this.fillColor = color
				this.strokeColor = color
				return this
			}

			function CompoundObject() {
				SceneGraphNode.call(this) // do superclass initialization
				this.subobjects = [] // the list of sub-objects of this object
			}
			CompoundObject.prototype = new SceneGraphNode() // (makes it a subclass!)
			CompoundObject.prototype.add = function (node) {
				this.subobjects.push(node)
				return this
			}
			CompoundObject.prototype.doDraw = function (g) {
				for (var i = 0; i < this.subobjects.length; i++) this.subobjects[i].draw(g)
			}

			function TransformedObject(object) {
				SceneGraphNode.call(this) // do superclass initialization
				this.object = object
				this.rotationInDegrees = 0
				this.scaleX = 1
				this.scaleY = 1
				this.translateX = 0
				this.translateY = 0
			}
			TransformedObject.prototype = new SceneGraphNode() // (makes it a subclass!)
			TransformedObject.prototype.setRotation = function (angle) {
				this.rotationInDegrees = angle
				return this
			}
			TransformedObject.prototype.setScale = function (sx, sy) {
				this.scaleX = sx
				this.scaleY = sy
				return this
			}
			TransformedObject.prototype.setTranslation = function (dx, dy) {
				this.translateX = dx
				this.translateY = dy
				return this
			}
			TransformedObject.prototype.doDraw = function (g) {
				g.save()
				if (this.translateX != 0 || this.translateY != 0) {
					g.translate(this.translateX, this.translateY)
				}
				if (this.rotationInDegrees != 0) {
					g.rotate((this.rotationInDegrees / 180) * Math.PI)
				}
				if (this.scaleX != 1 || this.scaleY != 1) {
					g.scale(this.scaleX, this.scaleY)
				}
				this.object.draw(g)
				g.restore()
			}

			// Create some basic shapes as custom SceneGraphNode objects.

			var line = new SceneGraphNode()
			line.doDraw = function (g) {
				g.beginPath()
				g.moveTo(-0.5, 0)
				g.lineTo(0.5, 0)
				g.stroke()
			}

			var filledRect = new SceneGraphNode()
			filledRect.doDraw = function (g) {
				g.fillRect(-0.5, -0.5, 1, 1)
			}

			var rect = new SceneGraphNode()
			rect.doDraw = function (g) {
				g.strokeRect(-0.5, -0.5, 1, 1)
			}

			var filledCircle = new SceneGraphNode()
			filledCircle.doDraw = function (g) {
				g.beginPath()
				g.arc(0, 0, 0.5, 0, 2 * Math.PI)
				g.fill()
			}

			var circle = new SceneGraphNode()
			circle.doDraw = function (g) {
				g.beginPath()
				g.arc(0, 0, 0.5, 0, 2 * Math.PI)
				g.stroke()
			}

			var filledTriangle = new SceneGraphNode()
			filledTriangle.doDraw = function (g) {
				g.beginPath()
				g.moveTo(-0.5, 0)
				g.lineTo(0.5, 0)
				g.lineTo(0, 1)
				g.closePath()
				g.fill()
			}

			// MÓJ OBIEKT: Koło ze szprychami
			var wheelShape = new SceneGraphNode()
			wheelShape.doDraw = function (g) {
				g.beginPath()
				g.arc(0, 0, 0.5, 0, 2 * Math.PI)
				g.stroke()
				// Rysujemy 12 szprych
				for (var i = 0; i < 12; i++) {
					g.beginPath()
					g.moveTo(0, 0)
					g.lineTo(0.5 * Math.cos((i * Math.PI) / 6), 0.5 * Math.sin((i * Math.PI) / 6))
					g.stroke()
				}
			}

			// ------------------------------- graphics support functions --------------------------

			function draw() {
				graphics.save()
				graphics.fillStyle = BACKGROUND
				graphics.fillRect(0, 0, canvas.width, canvas.height)
				graphics.fillStyle = 'black'
				applyLimits(graphics, X_LEFT, X_RIGHT, Y_TOP, Y_BOTTOM, false)
				graphics.lineWidth = pixelSize
				world.draw(graphics)
				graphics.restore()
			}

			function applyLimits(g, xleft, xright, ytop, ybottom, preserveAspect) {
				var width = canvas.width
				var height = canvas.height
				if (preserveAspect) {
					var displayAspect = Math.abs(height / width)
					var requestedAspect = Math.abs((ybottom - ytop) / (xright - xleft))
					var excess
					if (displayAspect > requestedAspect) {
						excess = (ybottom - ytop) * (displayAspect / requestedAspect - 1)
						ybottom += excess / 2
						ytop -= excess / 2
					} else if (displayAspect < requestedAspect) {
						excess = (xright - xleft) * (requestedAspect / displayAspect - 1)
						xright += excess / 2
						xleft -= excess / 2
					}
				}
				var pixelWidth = Math.abs((xright - xleft) / width)
				var pixelHeight = Math.abs((ybottom - ytop) / height)
				pixelSize = Math.min(pixelWidth, pixelHeight)
				g.scale(width / (xright - xleft), height / (ybottom - ytop))
				g.translate(-xleft, -ytop)
			}

			//------------------ Animation framework ------------------------------

			var running = false

			function frame() {
				if (running) {
					updateFrame()
					draw()
					requestAnimationFrame(frame)
				}
			}

			function doAnimationCheckbox() {
				var shouldRun = document.getElementById('animateCheck').checked
				if (shouldRun != running) {
					running = shouldRun
					if (running) requestAnimationFrame(frame)
				}
			}

			//----------------------- initialization -------------------------------

			function init() {
				canvas = document.getElementById('thecanvas')
				if (!canvas.getContext) {
					document.getElementById('message').innerHTML = 'ERROR: Canvas not supported'
					return
				}
				graphics = canvas.getContext('2d')
				document.getElementById('animateCheck').checked = false
				document.getElementById('animateCheck').onchange = doAnimationCheckbox
				createWorld()
				draw()
			}
		</script>
	</head>

	<body onload="init()" style="background-color: #eeeeee">
		<h3>Scene Graph 2D</h3>
		<noscript>
			<p><b style="color: red">Error: This page requires JavaScript, but it is not available.</b></p>
		</noscript>
		<p id="message">
			<label><input type="checkbox" id="animateCheck" /><b>Run the Animation</b></label>
		</p>
		<div style="float: left; border: 2px solid black">
			<canvas id="thecanvas" width="800" height="600" style="display: block"></canvas>
		</div>
	</body>
</html>
